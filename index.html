<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أبو سعيد للبث المباشر 📺</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: #111827;
            --primary: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1f2937;
            --active-channel: #ef4444;
            --success: #10b981;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* الهيدر العلوي */
        .header { background: var(--panel-bg); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); height: 60px; z-index: 10; }
        .header h1 { margin: 0; color: var(--primary); font-size: 18px; display: flex; align-items: center; gap: 8px; }
        
        /* زر إخفاء وإظهار القنوات في الجوال */
        .toggle-menu-btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }

        /* الحاوية الرئيسية للمنصة */
        .tv-container { display: flex; flex: 1; height: calc(100vh - 60px); position: relative; overflow: hidden; }
        
        /* 🎥 قسم مشغل الفيديو */
        .video-section { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; height: 100%; }
        video { width: 100%; height: 100%; background: #000; object-fit: contain; }
        
        /* 📋 قسم قائمة القنوات (البانيل الجانبي) */
        .channels-sidebar { width: 320px; display: flex; flex-direction: column; background: var(--panel-bg); border-right: 1px solid var(--border); height: 100%; transition: transform 0.3s ease; z-index: 5; }
        
        .search-box { padding: 12px; border-bottom: 1px solid var(--border); }
        .search-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-dark); color: white; outline: none; font-size: 14px; text-align: right; }
        
        .channels-list { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
        .channel-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; margin-bottom: 6px; border-radius: 8px; cursor: pointer; background: var(--bg-dark); transition: 0.2s; border: 1px solid transparent; }
        .channel-main { display: flex; align-items: center; gap: 10px; flex: 1; overflow: hidden; }
        .channel-item:hover { background: #1f2937; }
        .channel-item.active { background: var(--active-channel); font-weight: bold; border-color: #f87171; }
        .channel-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: contain; background: #fff; padding: 2px; }
        .channel-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn-del-ch { background: #dc2626; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; display: none; }

        /* 🔒 بانيل لوحة التحكم بأسفل القائمة الجانبية */
        .admin-box { background: var(--bg-dark); padding: 12px; border-top: 1px dashed var(--primary); }
        .admin-fields { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .admin-fields input { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel-bg); color: white; font-size: 13px; }
        .admin-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }

        #toast { position: fixed; bottom: 15px; left: 15px; background: #10b981; color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 13px; display: none; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* 📱 تفاصيل التكيف مع شاشات الجوال (آيفون وأندرويد) */
        @media (max-width: 768px) {
            .tv-container { flex-direction: column; }
            .video-section { height: 40%; flex: none; }
            .channels-sidebar { width: 100%; height: 60%; position: absolute; bottom: 0; left: 0; transform: translateY(0); }
            /* عند تفعيل وضع ملء الشاشة للفيديو بالجوال */
            .tv-container.hide-menu .video-section { height: 100%; }
            .tv-container.hide-menu .channels-sidebar { transform: translateY(100%); }
        }
        
        /* عند قلب الجوال بالعرض لمشاهدة المباراة */
        @media (max-width: 900px) and (orientation: landscape) {
            .header { display: none; }
            .tv-container { height: 100vh; flex-direction: row; }
            .video-section { height: 100%; width: 100%; }
            .channels-sidebar { position: absolute; right: 0; top: 0; width: 280px; height: 100%; transform: translateX(100%); }
            .tv-container.hide-menu .channels-sidebar { transform: translateX(100%); }
            /* فتح القائمة بالعرض */
            .tv-container:not(.hide-menu) .channels-sidebar { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="header">
        <h1>📺 منصة البث المباشر</h1>
        <button class="toggle-menu-btn" onclick="toggleMenu()">📱 إخفاء/إظهار القنوات</button>
    </div>

    <div class="tv-container" id="tvContainer">
        <div class="video-section">
            <video id="videoPlayer" controls autoplay playsinline webkit-playsinline></video>
        </div>

        <div class="channels-sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن قناة..." onkeyup="filterChannels()">
            </div>
            
            <div class="channels-list" id="channelsList">
                <div style="text-align:center; padding: 20px; color: var(--text-muted); font-size:13px;">⏳ جاري تحديث القنوات...</div>
            </div>

            <div class="admin-box">
                <div id="loginForm">
                    <input type="password" id="tokenInput" placeholder="أدخل رمز الـ Token لفتح البانيل" style="width:100%; padding:8px; border-radius:6px; border:1px solid var(--border); background:var(--panel-bg); color:white;">
                    <button onclick="loginAdmin()" style="width:100%; margin-top:5px; padding:6px; background:var(--success); border:none; color:white; border-radius:6px; cursor:pointer; font-weight:bold;">دخول البانيل 🔑</button>
                </div>
                
                <div id="addForm" style="display:none;">
                    <span style="font-size:12px; color:var(--success); font-weight:bold;">✨ إضافة رابط بث مباشر:</span>
                    <div class="admin-fields">
                        <input type="text" id="chName" placeholder="اسم القناة">
                        <input type="text" id="chUrl" placeholder="رابط البث (m3u8)" style="direction:ltr;">
                        <input type="text" id="chLogo" placeholder="رابط الشعار (اختياري)" style="direction:ltr;">
                        <button class="admin-btn" onclick="addChannel()">حفظ القناة بالسيرفر 🚀</button>
                        <button onclick="logoutAdmin()" style="background:#4b5563; color:white; border:none; padding:4px; border-radius:4px; font-size:11px; cursor:pointer;">قفل البانيل 🔒</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = "01776787858de";
        const REPO = "tv"; // اسم مستودع التلفزيون الحالي
        const FILE_PATH = "channels.json";

        let channelsArray = [];
        let fileSHA = null;
        const video = document.getElementById('videoPlayer');
        const hls = new Hls({ maxMaxBufferLength: 10 }); // تحسين ذاكرة التخزين المؤقت للجوال

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.style.backgroundColor = isError ? '#dc2626' : '#10b981';
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        // إخفاء وإظهار القنوات لتكبير حجم البث في الجوال
        function toggleMenu() {
            document.getElementById('tvContainer').classList.toggle('hide-menu');
        }

        window.onload = function() {
            loadChannelsFromServer();
            checkAdminStatus();
        };

        async function loadChannelsFromServer() {
            const container = document.getElementById('channelsList');
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, { cache: 'no-store' });
                if(res.status === 404) {
                    container.innerHTML = "<p style='text-align:center; font-size:12px; color:var(--text-muted);'>لا توجد قنوات مضافة، افتح البanيل بالأسفل وضف أول قناة!</p>";
                    return;
                }
                const data = await res.json();
                fileSHA = data.sha;
                channelsArray = JSON.parse(atob(data.content));
                renderChannels();
            } catch(e) {
                container.innerHTML = "<p style='text-align:center; color:#dc2626; font-size:12px;'>خطأ في الاتصال بالسيرفر.</p>";
            }
        }

        function renderChannels() {
            const container = document.getElementById('channelsList');
            container.innerHTML = "";
            const isAdmin = document.getElementById('addForm').style.display === 'block';

            if(channelsArray.length === 0) {
                container.innerHTML = "<p style='text-align:center; font-size:12px; color:var(--text-muted);'>القائمة فارغة.</p>";
                return;
            }

            channelsArray.forEach((ch, index) => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                
                const logoHTML = ch.logo ? `<img src="${ch.logo}" class="channel-logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'35\' height=\'35\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23000\' stroke-width=\'2\'><rect x=\'2\' y=\'7\' width=\'20\' height=\'15\' rx=\'2\'/><polyline points=\'17 2 12 7 7 2\'/></svg>'">` : `<div class="channel-logo" style="display:flex;align-items:center;justify-content:center;color:#000;font-size:16px;">📺</div>`;
                
                item.innerHTML = `
                    <div class="channel-main" onclick="playChannel('${ch.url}', this)">
                        ${logoHTML}
                        <div class="channel-name">${ch.name}</div>
                    </div>
                    <button class="btn-del-ch" style="display: ${isAdmin ? 'block' : 'none'};" onclick="deleteChannel(${index})">حذف 🗑️</button>
                `;
                container.appendChild(item);
            });
        }

        function playChannel(url, element) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            element.parentElement.classList.add('active');

            // إخفاء القائمة تلقائياً في الجوال عند اختيار قناة لتبدأ المشاهدة فوراً
            if(window.innerWidth <= 768) { toggleMenu(); }

            if (Hls.isSupported()) {
                hls.loadSource(url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // مشغل الآيفون الأصلي (Safari iOS)
                video.src = url; 
                video.play();
            } else {
                showToast("هذا البث غير مدعوم على متصفحك الحالي", true);
            }
        }

        function filterChannels() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.channel-item').forEach(item => {
                const name = item.querySelector('.channel-name').innerText.toLowerCase();
                item.style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        function loginAdmin() {
            const token = document.getElementById('tokenInput').value.trim();
            if(!token) return showToast("أدخل الرمز أولاً!", true);
            localStorage.setItem('tv_token', token);
            checkAdminStatus();
            showToast("تم فتح بانيل التحكم!");
        }

        function logoutAdmin() {
            localStorage.removeItem('tv_token');
            location.reload();
        }

        function checkAdminStatus() {
            const token = localStorage.getItem('tv_token');
            if(token) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('addForm').style.display = 'block';
                document.querySelectorAll('.btn-del-ch').forEach(b => b.style.display = 'block');
                renderChannels();
            }
        }

        async function addChannel() {
            const token = localStorage.getItem('tv_token');
            const name = document.getElementById('chName').value.trim();
            const url = document.getElementById('chUrl').value.trim();
            const logo = document.getElementById('chLogo').value.trim();

            if(!name || !url) return showToast("الرجاء إدخال الاسم ورابط الـ m3u8", true);

            channelsArray.push({ name, url, logo });
            await saveToGitHub(token, `Add channel: ${name}`);
        }

        async function deleteChannel(index) {
            if(!confirm("حذف هذه القناة؟")) return;
            const token = localStorage.getItem('tv_token');
            channelsArray.splice(index, 1);
            await saveToGitHub(token, "Delete channel");
        }

        async function saveToGitHub(token, msg) {
            const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(channelsArray, null, 2))));
            const bodyData = { message: msg, content: base64Content };
            if(fileSHA) bodyData.sha = fileSHA;

            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });

                if(res.ok) {
                    showToast("تم الحفظ وتحديث السيرفر! 🎉");
                    document.getElementById('chName').value = "";
                    document.getElementById('chUrl').value = "";
                    document.getElementById('chLogo').value = "";
                    loadChannelsFromServer();
                } else {
                    showToast("فشل الحفظ، تأكد من صلاحية التوكن.", true);
                }
            } catch(e) { showToast("خطأ في الاتصال.", true); }
        }
    </script>
</body>
</html>
